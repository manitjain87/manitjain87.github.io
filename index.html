                    <p>Over the last few years, I've had a front-row seat to two very different realities in high-growth businesses: one hitting $100Bn+ GMV, still growing 30%+ YoY, accelerating product velocity, deepening moats, and compounding operating leverage + FCF; the other — similar sector (partial overlap), multi-$Bn+ scale, top talent, endless strategies over 10+ years but still struggling to make ends meet.</p>
                    
                    <p>I've lived this globally, across public and private markets.</p>
                    
                    <h3>The Hard Truth</h3>
                    
                    <p>As an operator and investor obsessed with business models, I've learned one thing: <strong>the gap between winners and losers comes down to how ruthlessly a company manages trade-offs.</strong></p>
                    
                    <p>Capital and organizational attention are finite. I've steered millions across performance marketing bets, pricing/promo experiments, new logistics builds, strategic partnerships, build/buy/partner calls, and market expansions.</p>
                    
                    <p>I always aim to pressure-test against a dual lens:</p>
                    <ul>
                        <li><strong>Short-term reality:</strong> Hitting quarterly/annual metrics</li>
                        <li><strong>Long-term value:</strong> Maximizing terminal value</li>
                    </ul>
                    
                    <h3>The Missing Lever: Executive Incentives</h3>
                    
                    <p>But nailing those conversations requires one thing most companies get wrong: <strong>executive and key-leader (functional heads / key personnel) incentive structure.</strong></p>
                    
                    <p>Most companies fail to treat this as the C-suite's most powerful strategic lever. This requires deep, first-principles thinking about what you aim to drive and related fair-value-sharing vs. the standard, straight-line, time-in-business based equity vesting framework.</p>
                    
                    <p><strong>Charlie Munger nailed it:</strong> "Show me the incentive, and I will show you the outcome."</p>
                    
                    <p>If your business keeps making suboptimal trade-offs, stop staring at budget spreadsheets. Start auditing how you structure the incentives for your leaders and key personnel.</p>
                    
                    <h3>Case Study: dLocal (One of My Favorite Holdings)</h3>
                    
                    <p>Take dLocal as a masterclass in deliberate trade-offs creating a monster business.</p>
                    
                    <p>They consciously accepted a <strong>lower net take rate</strong> (down to 0.88% in Q4 2025 from 1.09% in Q4 2024) to land and embed with the highest-volume global enterprise clients in e-commerce, ride-hailing, streaming, remittances, and fintech across emerging markets.</p>

                    <ul>
                        <li><strong>Deep API integration across 40+ emerging markets</strong> drove massive stickiness</li>
                        <li><strong>NRR (Net Revenue Retention): 145%</strong></li>
                        <li><strong>TPV retention: 158% in 2025</strong></li>
                        <li>Existing merchants expand countries, methods, and products (new add: BNPL), turning dLocal into indispensable infrastructure</li>
                    </ul>
                    
                    <p>They chased <strong>absolute gross profit dollars</strong> ($403M in FY2025, +37% YoY) over margin %, while they scaled TPV to a record <strong>$41 billion in 2025, up 60% YoY</strong>.</p>
                    
                    <p>This has unleashed operating leverage and exceptional FCF +110% YoY.</p>
                    
                    <p><strong>Result:</strong> Dividends declared, buyback authorized — while still investing aggressively in growth.</p>
                    
                    <h3>The Pattern</h3>
                    
                    <p>When leaders win on:</p>
                    <ul>
                        <li><strong>Volume</strong> (Transactions)</li>
                        <li><strong>Stickiness</strong> (customer retention + MOAT)</li>
                        <li><strong>Operating leverage</strong> (FCF)</li>
                    </ul>
                    
                    <p>They embrace painful-but-right trade-offs that build compounding machines.</p>

                content: `
                    <p>What's the simplest way to explain an e-commerce marketplace business model? Here is my take:</p>
                    
                    <h3>The Five Core Tenets</h3>
                    
                    <h4>1. Provide merchants with an attractive channel to grow their business</h4>
                    <p>Provide them with the tools and policies to do so in a simple and cost efficient manner → attract and retain sellers</p>
                    
                    <h4>2. Provide customers with wide selection, competitive price, and fast and reliable delivery speed</h4>
                    <p>→ Loyal customer base</p>
                    
                    <h4>3. Make a healthy margin (cut) by enabling #1 and #2 above</h4>
                    
                    <h4>4. Re-invest the margins to become better at #1 and #2 above</h4>
                    
                    <h4>5. Maintain the above order of priority</h4>
                    <p>→ Build trust in your marketplace</p>
                    
                    <h3>Execution at Scale</h3>
                    
                    <p>This is a simple and high ROI business model, yet <strong>extremely difficult to execute at scale</strong>.</p>
                    
                    <p>There are a few international success stories (pure play marketplaces) that have done this successfully such as <strong>Alibaba, Etsy and MercadoLibre</strong>. They have their own niche but the basic tenets 1-5 above seem to be intact.</p>
                    
                    <h3>New Concepts Emerging</h3>
                    
                    <p>Lately, the new concepts of <strong>social commerce</strong> (top-of-mind: IG and TikTok, Pinterest) and <strong>live commerce</strong> (top-of-mind: Whatnot, Supergreat, Flip) are gaining traction. These players over-index on the entertainment and social angle of shopping.</p>
                    
                    <p><strong>I wonder:</strong> Will these new concepts 'truly' disrupt the pure play marketplaces? Can they succeed at scale without investing in the basic tenets 1-5 outlined above or perhaps rely on Shopify for #1 and focus on #2?</p>
                    
                    <p>Maybe these models can co-exist and have their own respective category winners?</p>
                `

                    <p>No wonder even in the current market environment where most companies are cutting back, Shopify continues to invest in products catering to end-to-end merchant requirements — product discovery and CRM, web3/NFT, AR/VR, B2B fintech, supply chain (from port to porch), POS (incl HW), cross-border commerce, partnering with top global B2C and B2B tech companies and investing in building the enabling infra for the partner ecosystem.</p>

                id: 'mental-models-partnerships',

                title: 'Mental model for product partnerships',
                excerpt: 'Mutual value creation first, distribution second. Primary goal is delivering greater customer value through integrated solutions.',
                date: '2021-11-15',
                isPDF: false,
                content: `
                    <p>I'm reading "The Great Mental Models" by Shane Parrish, Farnam Street. This book contains timeless, broad ideas and is a homage to the idea that we can benefit from understanding how the world works.</p>
                    
                    <blockquote style="border-left: 4px solid var(--color-accent); padding-left: 16px; margin: 16px 0; font-style: italic;">
                    A mental model is simply a representation of how something works. We cannot keep all the details of the world in our brains, so we use models to simplify the complex into understandable and organizable chunks.
                    </blockquote>
                    
                    <p>This book has motivated me to think through and share my mental model about product partnerships.</p>
                    
                    <h3>Definition</h3>
                    
                    <blockquote style="border-left: 4px solid var(--color-accent); padding-left: 16px; margin: 16px 0; font-style: italic;">
                    A partnership is an arrangement where parties, known as business partners, agree to cooperate to advance their mutual interests.
                    </blockquote>
                    
                    <h3>The Primary Goal: Mutual Interest</h3>
                    
                    <p>A product partnership should deliver <strong>greater value for the customer(s)</strong> by using the partners' solution together, compared to using each of the two solutions separately without any integration or connection.</p>
                    
                    <p>Simply put: the solutions used together should help your customer(s) get closer to their goals and / or be more successful.</p>
                    
                    <p>Therefore, the parties need to be focused on creating, communicating and delivering the product synergy in a seamless manner. That I believe is the primary goal.</p>
                    
                    <h3>The Secondary Goal: Distribution</h3>
                    
                    <p>The secondary goal is distribution (i.e. co-marketing or co-selling), and <strong>not the other way round</strong>.</p>
                    
                    <p>To complete the loop, the secondary goal (distribution) should be leveraged as a means to reinvest in the primary goal (incremental value via product synergy).</p>
                    
                    <p>All the KPIs, such as expanding total addressable market, increasing customer lifetime value and generating referrals (or installs) should be perceived as the by-product of the above loop (flywheel).</p>
                    
                    <h3>Reasons for Sub-Optimal Outcomes</h3>
                    
                    <p>I've personally experienced well thought through partnerships or initiatives deliver sub-optimal results. The most common reason is:</p>
                    
                    <ul>
                        <li>The inability to create, communicate and deliver on the product synergies, OR</li>
                        <li>Having a greater focus on leveraging the partnership as a distribution channel compared to the focus on generating incremental value for the customer</li>
                    </ul>
                    
                    <p>Therefore, it is imperative for the partners to align on the primary goal, and how they define success. This requires <strong>long term thinking</strong> amongst all the parties involved.</p>
                    
                    <h3>Case Study: Shopify and Facebook</h3>
                    
                    <p>Shopify and Facebook partnership is a great example of this model:</p>
                    
                    <p>The merchants use Facebook to reach their customer, build a brand and community, while they use Shopify as the commerce backbone to manage their products, orders, inventory, fulfillment, sell on different channels, and much more. <strong>The merchants are far better off using these platforms/products together.</strong></p>
                    
                    <p>The two companies have continued to invest in improving the product synergies - recently, they expanded the partnership to include one-click checkout service (Shop Pay) available to merchants that sell on Facebook. This would allow the merchants to offer a faster checkout experience to their customers, leading to higher conversion.</p>
                    
                    <h3>Broader Application</h3>
                    
                    <p>While this model is based on my experience, I do believe it can be applied across a wide range of partnership (and even M&A) situations to achieve a better outcome for the customers, and consequently for the parties involved.</p>
                `
            },
